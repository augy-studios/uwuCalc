<!doctype html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMCYFTFPEL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }
        gtag('js', new Date());

        gtag('config', 'G-FMCYFTFPEL');
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9715826188316382"
        crossorigin="anonymous"></script>

    <link rel="manifest" href="/manifest.json" />

    <meta charset="utf-8">
    <title>Calculator | UwU Apps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Explore a collection of over 200+ calculators!">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Calculator | UwU Apps" />
    <meta property="og:site_name" content="UwU Apps" />
    <meta property="og:description" content="Explore a collection of over 200+ calculators!" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Jua">
    <link rel="stylesheet" href="/css/global.css">
    <meta name="theme-color" content="#ccffcc" />

    <!-- Embed Image -->
    <link rel="apple-touch-icon" href="/UWC-main.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image:src" content="/UWC-main.png">
    <meta property="og:image" content="/UWC-main.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script defer="" src="https://use.fontawesome.com/releases/v6.5.2/js/all.js"></script>
</head>

<body>
    <div class="app-layout">

        <!-- HEADER -->
        <header class="header">
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
            <a href="/" class="header-logo" aria-label="uwuCalc home">
                <img src="/UWC-main.png" alt="uwuCalc" width="32" height="32">
                <span>uwuCalc</span>
            </a>
            <div class="header-search" role="search">
                <svg class="header-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="search" id="searchInput" placeholder="Search 200+ calculators..." autocomplete="off"
                    aria-label="Search calculators" aria-autocomplete="list" aria-controls="searchDropdown" />
                <kbd class="search-shortcut" aria-hidden="true">Ctrl+K</kbd>
                <div class="search-dropdown" id="searchDropdown" role="listbox"></div>
            </div>
            <div class="header-actions">
                <a href="https://donate.stripe.com/28o2akeAr3hv0DK6oo" target="_blank" rel="noopener noreferrer"
                    class="coffee-btn" aria-label="Buy Augy a Coffee">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        aria-hidden="true">
                        <path d="M18 8h1a4 4 0 0 1 0 8h-1" />
                        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" />
                        <line x1="6" y1="1" x2="6" y2="4" />
                        <line x1="10" y1="1" x2="10" y2="4" />
                        <line x1="14" y1="1" x2="14" y2="4" />
                    </svg>
                    <span>Buy Augy a Coffee</span>
                </a>
                <button class="icon-btn" id="themeBtn" aria-label="Change theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        aria-hidden="true">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                </button>
            </div>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

        <!-- SIDEBAR (built by JS) -->
        <nav class="sidebar" id="sidebar" aria-label="Calculator categories">
            <div id="sidebarContent"></div>
        </nav>

        <main class="main-container">
            <div class="main-content">
                <div class="home-grid">

                    <!-- CALCULATOR WIDGET -->
                    <section class="calc-widget" aria-label="Calculator">
                        <div class="calc-mode-tabs" role="tablist">
                            <button class="calc-mode-tab active" role="tab" aria-selected="true"
                                aria-controls="basicPanel" id="tabBasic"
                                onclick="switchCalcMode('basic')">Basic</button>
                            <button class="calc-mode-tab" role="tab" aria-selected="false" aria-controls="sciPanel"
                                id="tabSci" onclick="switchCalcMode('sci')">Scientific</button>
                        </div>

                        <div class="calc-display" aria-live="polite" aria-atomic="true">
                            <div class="calc-expression" id="calcExpression"></div>
                            <div class="calc-result" id="calcResult">0</div>
                        </div>

                        <!-- BASIC MODE -->
                        <div id="basicPanel" role="tabpanel" aria-labelledby="tabBasic">
                            <div class="calc-btns basic-grid">
                                <button class="cbtn op" onclick="calcClear()">C</button>
                                <button class="cbtn op" onclick="calcSign()">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <line x1="5" y1="12" x2="19" y2="12" />
                                        <polyline points="12 5 19 12 12 19" /></svg>
                                    +/-
                                </button>
                                <button class="cbtn op" onclick="calcPercent()">%</button>
                                <button class="cbtn eq" onclick="calcOp('/')">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2.5">
                                        <line x1="8" y1="12" x2="16" y2="12" />
                                        <circle cx="12" cy="6" r="1" fill="currentColor" />
                                        <circle cx="12" cy="18" r="1" fill="currentColor" /></svg>
                                </button>
                                <button class="cbtn" onclick="calcNum('7')">7</button>
                                <button class="cbtn" onclick="calcNum('8')">8</button>
                                <button class="cbtn" onclick="calcNum('9')">9</button>
                                <button class="cbtn eq" onclick="calcOp('*')">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2.5">
                                        <line x1="18" y1="6" x2="6" y2="18" />
                                        <line x1="6" y1="6" x2="18" y2="18" /></svg>
                                </button>
                                <button class="cbtn" onclick="calcNum('4')">4</button>
                                <button class="cbtn" onclick="calcNum('5')">5</button>
                                <button class="cbtn" onclick="calcNum('6')">6</button>
                                <button class="cbtn eq" onclick="calcOp('-')">-</button>
                                <button class="cbtn" onclick="calcNum('1')">1</button>
                                <button class="cbtn" onclick="calcNum('2')">2</button>
                                <button class="cbtn" onclick="calcNum('3')">3</button>
                                <button class="cbtn eq" onclick="calcOp('+')">+</button>
                                <button class="cbtn span2" onclick="calcNum('0')">0</button>
                                <button class="cbtn" onclick="calcDecimal()">.</button>
                                <button class="cbtn eq" onclick="calcEquals()">=</button>
                            </div>
                        </div>

                        <!-- SCIENTIFIC MODE -->
                        <div id="sciPanel" role="tabpanel" aria-labelledby="tabSci" style="display:none">
                            <div class="calc-btns sci-grid">
                                <button class="cbtn fn op" onclick="calcClear()">C</button>
                                <button class="cbtn fn op" onclick="calcSign()">+/-</button>
                                <button class="cbtn fn op" onclick="calcPercent()">%</button>
                                <button class="cbtn fn op" onclick="calcBackspace()">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z" />
                                        <line x1="18" y1="9" x2="12" y2="15" />
                                        <line x1="12" y1="9" x2="18" y2="15" /></svg>
                                </button>
                                <button class="cbtn eq fn" onclick="calcOp('/')">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2.5">
                                        <line x1="8" y1="12" x2="16" y2="12" />
                                        <circle cx="12" cy="6" r="1" fill="currentColor" />
                                        <circle cx="12" cy="18" r="1" fill="currentColor" /></svg>
                                </button>

                                <button class="cbtn fn op" onclick="calcSci('sin')">sin</button>
                                <button class="cbtn fn op" onclick="calcSci('cos')">cos</button>
                                <button class="cbtn fn op" onclick="calcSci('tan')">tan</button>
                                <button class="cbtn fn op" onclick="calcSci('log')">log</button>
                                <button class="cbtn eq fn" onclick="calcOp('*')">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2.5">
                                        <line x1="18" y1="6" x2="6" y2="18" />
                                        <line x1="6" y1="6" x2="18" y2="18" /></svg>
                                </button>

                                <button class="cbtn fn op" onclick="calcSci('sqrt')">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <polyline points="4 12 8 6 11 18 14 10 17 14 20 14" /></svg>
                                </button>
                                <button class="cbtn fn op" onclick="calcSci('sq')">x²</button>
                                <button class="cbtn fn op" onclick="calcSci('inv')">1/x</button>
                                <button class="cbtn fn op" onclick="calcSci('ln')">ln</button>
                                <button class="cbtn eq fn" onclick="calcOp('-')">-</button>

                                <button class="cbtn" onclick="calcNum('7')">7</button>
                                <button class="cbtn" onclick="calcNum('8')">8</button>
                                <button class="cbtn" onclick="calcNum('9')">9</button>
                                <button class="cbtn fn op" onclick="calcSci('pi')">π</button>
                                <button class="cbtn eq fn" onclick="calcOp('+')">+</button>

                                <button class="cbtn" onclick="calcNum('4')">4</button>
                                <button class="cbtn" onclick="calcNum('5')">5</button>
                                <button class="cbtn" onclick="calcNum('6')">6</button>
                                <button class="cbtn fn op" onclick="calcSci('e')">e</button>
                                <button class="cbtn fn op" onclick="calcSci('pow')">xⁿ</button>

                                <button class="cbtn" onclick="calcNum('1')">1</button>
                                <button class="cbtn" onclick="calcNum('2')">2</button>
                                <button class="cbtn" onclick="calcNum('3')">3</button>
                                <button class="cbtn fn op" onclick="calcSci('abs')">|x|</button>
                                <button class="cbtn fn op" onclick="calcSci('fact')">n!</button>

                                <button class="cbtn span2" onclick="calcNum('0')">0</button>
                                <button class="cbtn" onclick="calcDecimal()">.</button>
                                <button class="cbtn fn op" onclick="calcSci('exp')">EXP</button>
                                <button class="cbtn eq" onclick="calcEquals()">=</button>
                            </div>
                        </div>
                    </section>

                    <!-- DISCOVER SECTION -->
                    <section class="discover-section" aria-label="Discover calculators">
                        <div class="section-header">
                            <h1 class="section-title">Discover Calculators</h1>
                            <span class="section-badge" id="calcCount">170+</span>
                        </div>

                        <div class="category-tabs" role="tablist" id="categoryTabs">
                            <button class="cat-tab active" role="tab" data-cat="all">All</button>
                            <button class="cat-tab" role="tab" data-cat="Financial">Financial</button>
                            <button class="cat-tab" role="tab" data-cat="Fitness &amp; Health">Fitness &amp;
                                Health</button>
                            <button class="cat-tab" role="tab" data-cat="Math">Math</button>
                            <button class="cat-tab" role="tab" data-cat="Other">Other</button>
                            <button class="cat-tab" role="tab" data-cat="US-Centric">&#x1F1FA;&#x1F1F8;
                                US-Centric
                            </button>
                            <button class="cat-tab" role="tab" data-cat="Singapore">&#x1F1F8;&#x1F1EC;
                                Singapore
                            </button>
                            <button class="cat-tab" role="tab" data-cat="favourites">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none"
                                    style="display:inline-block;vertical-align:middle;margin-right:4px;">
                                    <polygon
                                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                                    </svg>
                                Favourites
                            </button>
                        </div>

                        <div class="calc-grid" id="calcGrid" aria-label="Calculator list"></div>
                    </section>

                </div>
            </div>
        </main>
        <footer class="site-footer">
            Made with <svg class="footer-heart" width="16" height="16" viewBox="0 0 24 24" fill="#22c55e" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> by Augy
        </footer>
    </div>

    <!-- THEME MODAL -->
    <div class="modal-overlay" id="themeModal" role="dialog" aria-modal="true" aria-labelledby="themeModalTitle">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="themeModalTitle">Choose Theme</h2>
                <button class="modal-close" id="themeModalClose" aria-label="Close theme picker">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" /></svg>
                </button>
            </div>
            <div class="theme-grid" role="radiogroup"></div>
        </div>
    </div>

    <div class="toast-container" aria-live="polite"></div>

    <script src="/js/registry.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/search.js"></script>
    <script src="/js/history.js"></script>
    <script src="/js/favourites.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/home.js"></script>
    <script src="/js/basic-calculator.js"></script>

</body>

</html>
